    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --success-color: #27ae60;
            --error-color: #c0392b;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .quiz-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 25px;
            margin-bottom: 25px;
            border-left: 5px solid var(--secondary-color);
            transition: all 0.3s ease;
        }

        .question-number {
            font-weight: bold;
            color: var(--secondary-color);
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 1.05em;
            font-weight: 500;
            margin-bottom: 15px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-label {
            display: block;
            padding: 12px 15px;
            background-color: #f1f3f5;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .option-label:hover {
            background-color: #e9ecef;
        }

        .option-label input {
            margin-right: 10px;
        }

        .result-panel {
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 30px;
            display: none;
        }

        .score-text {
            font-size: 1.5em;
            font-weight: bold;
        }

        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            font-size: 0.95em;
        }

        .feedback.correct {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .feedback.incorrect {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .rationale-title {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .submit-btn-container {
            text-align: center;
            margin: 40px 0;
        }

        .submit-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            transition: background-color 0.2s, transform 0.1s;
        }

        .submit-btn:hover {
            background-color: #1a252f;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .correct-choice {
            border: 2px solid var(--success-color) !important;
            background-color: #e8f5e9 !important;
        }

        .incorrect-choice {
            border: 2px solid var(--error-color) !important;
            background-color: #ffebee !important;
        }
    </style>
</head>

// クイズHTMLを動的に生成
function initQuiz() {
    const container = document.getElementById('quizContainer');
    quizData.forEach((data, index) => {
        const card = document.createElement('div');
        card.className = 'quiz-card';
        card.id = `card_${index}`;

        let optionsHTML = '';
        data.options.forEach((option, oIndex) => {
            optionsHTML += `
                <label class="option-label" id="label_${index}_${oIndex}">
                    <input type="radio" name="question_${index}" value="${oIndex}">
                    ${option}
                </label>
            `;
        });

        card.innerHTML = `
            <div class="question-number">第 ${index + 1} 問</div>
            <div class="question-text">${data.q}</div>
            <div class="options-container">
                ${optionsHTML}
            </div>
            <div class="feedback" id="feedback_${index}"></div>
        `;
        container.appendChild(card);
    });
}

// 採点と結果の表示
function checkAnswers() {
    let score = 0;
    
    quizData.forEach((data, index) => {
        const selected = document.querySelector(`input[name="question_${index}"]:checked`);
        const feedbackDiv = document.getElementById(`feedback_${index}`);
        
        // 全ての選択肢の背景色をクリア
        data.options.forEach((_, oIndex) => {
            document.getElementById(`label_${index}_${oIndex}`).className = 'option-label';
        });

        if (selected) {
            const userAnswer = parseInt(selected.value);
            if (userAnswer === data.answer) {
                score++;
                feedbackDiv.className = 'feedback correct';
                feedbackDiv.innerHTML = `<div class="rationale-title">正解！</div>${data.rationale}`;
                document.getElementById(`label_${index}_${userAnswer}`).classList.add('correct-choice');
            } else {
                feedbackDiv.className = 'feedback incorrect';
                feedbackDiv.innerHTML = `<div class="rationale-title">不正解</div>【正解：${data.options[data.answer]}】<br>${data.rationale}`;
                document.getElementById(`label_${index}_${userAnswer}`).classList.add('incorrect-choice');
                document.getElementById(`label_${index}_${data.answer}`).classList.add('correct-choice');
            }
        } else {
            feedbackDiv.className = 'feedback incorrect';
            feedbackDiv.innerHTML = `<div class="rationale-title">未選択</div>【正解：${data.options[data.answer]}】<br>${data.rationale}`;
            document.getElementById(`label_${index}_${data.answer}`).classList.add('correct-choice');
        }
    });

    const resultPanel = document.getElementById('resultPanel');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const commentDisplay = document.getElementById('commentDisplay');
    
    scoreDisplay.innerText = `結果：30問中 ${score} 問 正解 （正答率: ${Math.round((score/30)*100)}%）`;
    
    if (score === 30) {
        commentDisplay.innerText = "素晴らしい！全問正解です。講義内容が完全に定着しています。";
    } else if (score >= 24) {
        commentDisplay.innerText = "合格点クリアです。間違えた部分の資料を再確認しておきましょう。";
    } else {
        commentDisplay.innerText = "もう一度講義資料（第1回、第4回〜第7回）を読み直して復習してみましょう。";
    }
    
    resultPanel.style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.onload = initQuiz;
</script>
